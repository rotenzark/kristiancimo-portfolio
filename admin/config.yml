backend:
  name: github
  repo: rotenzark/kristiancimo-portfolio
  branch: main

media_folder: "media"
public_folder: "/media"

site_url: https://kristiancimo.it
display_url: https://kristiancimo.it

locale: en

collections:
  # ═══════════════════════════════════════════════════
  # SITE-WIDE SETTINGS
  # ═══════════════════════════════════════════════════
  - name: "settings"
    label: "Site Settings"
    description: "Hero, About, Footer, Clients — everything shown on the homepage outside of the Work grid."
    files:
      - name: "site"
        label: "Hero / Header"
        file: "data/site.json"
        format: "json"
        fields:
          - { label: "Page Title (browser tab)", name: "title", widget: "string" }
          - { label: "Meta Description (SEO)", name: "description", widget: "text" }
          - { label: "Hero Tagline", name: "tagline", widget: "string" }
          - { label: "Hero Subtitle (italic)", name: "subtitle", widget: "string" }
          - { label: "Location (bottom-left of hero)", name: "location", widget: "string" }
          - { label: "Status (top-right of nav)", name: "status", widget: "string" }

      - name: "about"
        label: "About Section"
        file: "data/about.json"
        format: "json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            summary: "{{text}}"
            fields:
              - { label: "Paragraph", name: "text", widget: "text" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            summary: "{{value}} — {{label}}"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      - name: "footer"
        label: "Footer / Contact"
        file: "data/footer.json"
        format: "json"
        fields:
          - { label: "CTA — Line 1", name: "ctaLine1", widget: "string" }
          - { label: "CTA — Line 2", name: "ctaLine2", widget: "string" }
          - { label: "CTA — Line 3 (start)", name: "ctaLine3Pre", widget: "string" }
          - { label: "CTA — Line 3 (italic word)", name: "ctaLine3Em", widget: "string" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - label: "Social Links"
            name: "social"
            widget: "list"
            summary: "{{label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - name: "clients"
        label: "Clients (Marquee)"
        file: "data/clients.json"
        format: "json"
        fields:
          - label: "Clients"
            name: "items"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "Client Name", name: "name", widget: "string" }

  # ═══════════════════════════════════════════════════
  # PROJECTS
  # ═══════════════════════════════════════════════════
  - name: "projects"
    label: "Projects"
    description: "Each project appears in the Work grid AND has its own dedicated page. Fill in only the sections you need."
    files:
      - name: "all_projects"
        label: "Projects List"
        file: "data/projects.json"
        format: "json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            summary: "{{order}}. {{title}} ({{year}})"
            fields:

              # ───── BASICS ─────
              - { label: "Display Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first in the work grid." }
              - { label: "Slug (URL identifier)", name: "slug", widget: "string", required: false, hint: "Used in the URL: project.html?id=YOUR-SLUG. Lowercase + hyphens only. Leave empty to auto-generate." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Cover Image (grid + project page hero)", name: "image", widget: "image" }
              - { label: "Preview Video (HOVER on homepage)", name: "previewVideo", widget: "file", required: false, hint: "Short MP4 (5-15s) that plays when visitors HOVER the project card on the homepage. Keep small — ideally <5MB. Leave empty if you don't want a hover preview." }
              - { label: "Cover Video (project page)", name: "coverVideo", widget: "string", required: false, hint: "Vimeo, YouTube or direct video URL — used as the big hero on the project page. If empty, the cover image is used." }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
              - { label: "Tag Label", name: "tagLabel", widget: "string", required: false, default: "Featured" }

              # ───── PROJECT PAGE METADATA ─────
              - { label: "Subtitle (italic, under project title)", name: "subtitle", widget: "text", required: false }
              - { label: "Client", name: "client", widget: "string", required: false }
              - { label: "Talent", name: "talent", widget: "string", required: false }
              - { label: "Role", name: "role", widget: "string", required: false }
              - { label: "Software", name: "software", widget: "string", required: false }
              - { label: "Format", name: "format", widget: "string", required: false }

              # ───── CASE STUDY TEXT ─────
              - { label: "Description / Case Study Text", name: "description", widget: "text", required: false, hint: "Long-form description. Separate paragraphs with a blank line." }

              # ───── GALLERY BLOCKS (v3 — multi-block with title + caption) ─────
              - label: "Gallery Blocks"
                name: "galleryBlocks"
                widget: "list"
                required: false
                summary: "{{heading}} ({{images.length}} images)"
                hint: "Add as many gallery blocks as you want. Each block can have an optional title, caption, and a set of images. Use for: client references, my proposals, final renders, mood boards, etc."
                fields:
                  - { label: "Tag (small uppercase label, optional)", name: "tag", widget: "string", required: false, hint: "e.g. CLIENT REFERENCES, MY PROPOSAL, FINAL RENDERS" }
                  - { label: "Heading (optional)", name: "heading", widget: "string", required: false, hint: "Big title for this gallery block." }
                  - { label: "Caption / Description (optional)", name: "caption", widget: "text", required: false, hint: "Short italic paragraph that introduces the images." }
                  - label: "Images"
                    name: "images"
                    widget: "list"
                    summary: "{{alt}}"
                    fields:
                      - { label: "Image", name: "src", widget: "image" }
                      - { label: "Alt text (optional)", name: "alt", widget: "string", required: false }

              # ───── SINGLE VIDEO EMBED ─────
              - { label: "Video URL (Vimeo or YouTube, optional)", name: "videoUrl", widget: "string", required: false }
              - { label: "Video Caption", name: "videoCaption", widget: "string", required: false }

              # ───── IMAGE BEFORE/AFTER — MULTIPLE (v3) ─────
              - label: "Image Before / After Slides"
                name: "beforeAfters"
                widget: "list"
                required: false
                summary: "{{title}}"
                hint: "Add one or more image before/after sliders. Useful for showing multiple shots from the same project."
                fields:
                  - { label: "Title (e.g. Shot 01, Wide, Close-up)", name: "title", widget: "string", required: false }
                  - { label: "Image — Before (raw plate)", name: "imageBefore", widget: "image", required: false }
                  - { label: "Image — After (final CGI)", name: "imageAfter", widget: "image", required: false }
                  - { label: "Label — Before", name: "labelBefore", widget: "string", required: false, default: "Raw Plate" }
                  - { label: "Label — After", name: "labelAfter", widget: "string", required: false, default: "Final CGI" }

              # ───── VIDEO BEFORE/AFTER — MULTIPLE (v3) ─────
              - label: "Video Before / After Slides"
                name: "videoBeforeAfters"
                widget: "list"
                required: false
                summary: "{{title}}"
                hint: "Add one or more synced video before/after sliders. Use short, optimized MP4 files (10-30s, <10MB)."
                fields:
                  - { label: "Title (e.g. Shot 01, Crash scene)", name: "title", widget: "string", required: false }
                  - { label: "Video — Before (raw plate)", name: "videoBefore", widget: "file", required: false }
                  - { label: "Video — After (final CGI)", name: "videoAfter", widget: "file", required: false }
                  - { label: "Label — Before", name: "labelBefore", widget: "string", required: false, default: "Raw Plate" }
                  - { label: "Label — After", name: "labelAfter", widget: "string", required: false, default: "Final CGI" }

              # ───── STORYTELLING ─────
              - label: "Storytelling Blocks (image + text)"
                name: "storytelling"
                widget: "list"
                required: false
                summary: "{{heading}}"
                fields:
                  - { label: "Heading", name: "heading", widget: "string", required: false }
                  - { label: "Text", name: "text", widget: "text", required: false }
                  - { label: "Image", name: "image", widget: "image" }

              # ───── CREDITS ─────
              - label: "Credits"
                name: "credits"
                widget: "list"
                required: false
                summary: "{{role}} — {{name}}"
                fields:
                  - { label: "Role", name: "role", widget: "string" }
                  - { label: "Name", name: "name", widget: "string" }

              # ───── NEXT PROJECT ─────
              - { label: "Show 'Next Project' at the bottom of this page", name: "showNextProject", widget: "boolean", default: true, required: false }
