backend:
  name: github
  repo: rotenzark/kristiancimo-portfolio
  branch: main

media_folder: "media"
public_folder: "/media"

site_url: https://kristiancimo.it
display_url: https://kristiancimo.it

locale: en

collections:
  # ═══════════════════════════════════════════════════
  # SITE-WIDE SETTINGS
  # ═══════════════════════════════════════════════════
  - name: "settings"
    label: "Site Settings"
    description: "Hero, About, Footer, Clients — everything shown on the homepage outside of the Work grid."
    files:
      - name: "site"
        label: "Hero / Header"
        file: "data/site.json"
        format: "json"
        fields:
          - { label: "Page Title (browser tab)", name: "title", widget: "string" }
          - { label: "Meta Description (SEO)", name: "description", widget: "text" }
          - { label: "Hero Tagline", name: "tagline", widget: "string", hint: "Small text above the big name. e.g. VFX · CGI · 3D · AI-Driven Visuals" }
          - { label: "Hero Subtitle (italic)", name: "subtitle", widget: "string", hint: "Italic phrase shown next to your name" }
          - { label: "Location (bottom-left of hero)", name: "location", widget: "string" }
          - { label: "Status (top-right of nav)", name: "status", widget: "string", hint: "e.g. Available 2026" }

      - name: "about"
        label: "About Section"
        file: "data/about.json"
        format: "json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            summary: "{{text}}"
            fields:
              - { label: "Paragraph", name: "text", widget: "text" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            summary: "{{value}} — {{label}}"
            fields:
              - { label: "Value", name: "value", widget: "string", hint: "e.g. 08+, 40+, 3" }
              - { label: "Label", name: "label", widget: "string", hint: "e.g. Years in CGI" }

      - name: "footer"
        label: "Footer / Contact"
        file: "data/footer.json"
        format: "json"
        fields:
          - { label: "CTA — Line 1", name: "ctaLine1", widget: "string" }
          - { label: "CTA — Line 2", name: "ctaLine2", widget: "string" }
          - { label: "CTA — Line 3 (start)", name: "ctaLine3Pre", widget: "string" }
          - { label: "CTA — Line 3 (italic word)", name: "ctaLine3Em", widget: "string" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - label: "Social Links"
            name: "social"
            widget: "list"
            summary: "{{label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - name: "clients"
        label: "Clients (Marquee)"
        file: "data/clients.json"
        format: "json"
        fields:
          - label: "Clients"
            name: "items"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "Client Name", name: "name", widget: "string" }

  # ═══════════════════════════════════════════════════
  # PROJECTS — each project has its own dedicated page
  # ═══════════════════════════════════════════════════
  - name: "projects"
    label: "Projects"
    description: "Each project appears in the Work grid AND has its own dedicated page (project.html?id=...). Fill in only the sections you need — empty sections are hidden automatically."
    files:
      - name: "all_projects"
        label: "Projects List"
        file: "data/projects.json"
        format: "json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            summary: "{{order}}. {{title}} ({{year}})"
            fields:

              # ───── BASICS (shown in homepage grid) ─────
              - { label: "Display Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first in the work grid." }
              - { label: "Slug (URL identifier)", name: "slug", widget: "string", required: false, hint: "Used in the URL: project.html?id=YOUR-SLUG. Use only lowercase letters, numbers, and hyphens. If empty, will be generated from the title." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Category", name: "category", widget: "string", hint: "e.g. Eyewear / F1, Sport / Brand" }
              - { label: "Cover Image (grid + project page hero)", name: "image", widget: "image" }
              - { label: "Cover Video (optional, overrides cover image on project page)", name: "coverVideo", widget: "string", required: false, hint: "Vimeo, YouTube or direct video URL. Used as the big hero of the project page. If empty, the cover image is used." }
              - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "If true, shows a small tag in the top-left of the card on the homepage." }
              - { label: "Tag Label", name: "tagLabel", widget: "string", required: false, default: "Featured", hint: "Text shown in the featured tag." }

              # ───── PROJECT PAGE METADATA ─────
              - { label: "Subtitle (italic, under project title)", name: "subtitle", widget: "text", required: false, hint: "Short evocative phrase that opens the project page." }
              - { label: "Client", name: "client", widget: "string", required: false }
              - { label: "Talent", name: "talent", widget: "string", required: false }
              - { label: "Role", name: "role", widget: "string", required: false, hint: "e.g. VFX · CGI · Direction" }
              - { label: "Software", name: "software", widget: "string", required: false, hint: "e.g. Houdini · C4D · Nuke" }
              - { label: "Format", name: "format", widget: "string", required: false, hint: "e.g. Campaign · Social" }

              # ───── CASE STUDY TEXT ─────
              - { label: "Description / Case Study Text", name: "description", widget: "text", required: false, hint: "Long-form description. Separate paragraphs with a blank line." }

              # ───── GALLERY ─────
              - label: "Gallery (images)"
                name: "gallery"
                widget: "list"
                required: false
                summary: "{{alt}}"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Alt text (optional)", name: "alt", widget: "string", required: false }

              # ───── VIDEO EMBED ─────
              - { label: "Video URL (Vimeo or YouTube)", name: "videoUrl", widget: "string", required: false, hint: "Paste the full URL — Vimeo and YouTube are auto-detected." }
              - { label: "Video Caption", name: "videoCaption", widget: "string", required: false }

              # ───── BEFORE / AFTER IMAGE SLIDER ─────
              - label: "Before / After (image slider)"
                name: "beforeAfter"
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - { label: "Image — Before (raw plate)", name: "imageBefore", widget: "image", required: false }
                  - { label: "Image — After (final CGI)", name: "imageAfter", widget: "image", required: false }
                  - { label: "Label — Before", name: "labelBefore", widget: "string", required: false, default: "Raw Plate" }
                  - { label: "Label — After", name: "labelAfter", widget: "string", required: false, default: "Final CGI" }

              # ───── VIDEO BEFORE / AFTER SLIDER ─────
              - label: "Video Breakdown (before/after VIDEO slider)"
                name: "videoBeforeAfter"
                widget: "object"
                required: false
                collapsed: true
                hint: "Two synced videos with a draggable handle. Upload .mp4 files (keep them short, <30s, optimized for web). Both videos play in sync."
                fields:
                  - { label: "Video — Before (raw plate)", name: "videoBefore", widget: "file", required: false, hint: "Upload an MP4 file." }
                  - { label: "Video — After (final CGI)", name: "videoAfter", widget: "file", required: false, hint: "Upload an MP4 file." }
                  - { label: "Label — Before", name: "labelBefore", widget: "string", required: false, default: "Raw Plate" }
                  - { label: "Label — After", name: "labelAfter", widget: "string", required: false, default: "Final CGI" }

              # ───── STORYTELLING (image + text blocks) ─────
              - label: "Storytelling Blocks (image + text)"
                name: "storytelling"
                widget: "list"
                required: false
                summary: "{{heading}}"
                fields:
                  - { label: "Heading", name: "heading", widget: "string", required: false, hint: "e.g. 01 — Plate cleanup" }
                  - { label: "Text", name: "text", widget: "text", required: false }
                  - { label: "Image", name: "image", widget: "image" }

              # ───── CREDITS ─────
              - label: "Credits"
                name: "credits"
                widget: "list"
                required: false
                summary: "{{role}} — {{name}}"
                fields:
                  - { label: "Role", name: "role", widget: "string" }
                  - { label: "Name", name: "name", widget: "string" }

              # ───── NEXT PROJECT TOGGLE ─────
              - { label: "Show 'Next Project' at the bottom of this page", name: "showNextProject", widget: "boolean", default: true, required: false }
